name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  release-please:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Generate Short Lived OAuth App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"
          repositories: "${{ github.event.repository.name }}"

      - name: Create / Update Release PR
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Sync context7.json on release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_JSON='${{ steps.release.outputs.pr }}'
          BRANCH=$(echo "$PR_JSON" | jq -r '.headBranchName // empty')
          if [ -z "$BRANCH" ]; then
            echo "No release PR JSON in outputs; skipping"
            exit 0
          fi
          REPO="${{ github.repository }}"

          git clone --branch "$BRANCH" --depth 2 \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" pr-checkout
          cd pr-checkout

          NEW_VERSION=$(awk -F= '/^VERSION=/ { gsub(/[^0-9.]/, "", $2); print $2; exit }' Makefile)
          if [ -z "$NEW_VERSION" ]; then
            echo "Could not parse VERSION from Makefile; skipping"
            exit 0
          fi

          jq --arg t "v$NEW_VERSION" --arg ver "$NEW_VERSION" \
            '.previousVersions[0].tag = $t | .previousVersions[0].title = $ver' \
            context7.json > context7.json.tmp
          mv context7.json.tmp context7.json

          if git diff --quiet context7.json; then
            echo "context7.json already at v$NEW_VERSION"
            exit 0
          fi

          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          BOT_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

          git add context7.json
          git commit -s -m "chore: bump context7.json to v$NEW_VERSION"
          git push origin "$BRANCH"

      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Add contributors to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, skipping contributors"
            exit 0
          fi

          # Get PR numbers from commits between tags
          PR_NUMBERS=$(git log ${PREV_TAG}..${TAG} --oneline | grep -oE '#[0-9]+' | tr -d '#' | sort -u)

          # Get unique contributors from PRs (excluding bots), sorted alphabetically
          CONTRIBUTORS=$(for pr in $PR_NUMBERS; do
            gh pr view $pr --json author -q '.author.login' 2>/dev/null
          done | sort -u | grep -v 'bot' | grep -v '^app/' | grep -v '^$')

          if [ -z "$CONTRIBUTORS" ]; then
            echo "No contributors found"
            exit 0
          fi

          # Format as bullet point list
          LINKS=$(echo "$CONTRIBUTORS" | sed 's/.*/* [@&](https:\/\/github.com\/&)/')

          # Append contributors to release body
          gh release view "$TAG" --json body -q .body > /tmp/body.md
          printf '\n### Contributors\n\n%s\n' "$LINKS" >> /tmp/body.md
          gh release edit "$TAG" --notes-file /tmp/body.md
